<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Control Center</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .nav-bar {
            background: var(--surface);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .nav-links a {
            margin-left: 15px;
            text-decoration: none;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .btn-home {
            color: var(--primary);
            border: 1px solid var(--primary);
        }

            .btn-home:hover {
                background: var(--primary);
                color: white;
            }

        .btn-logout {
            color: var(--danger);
            border: 1px solid var(--danger);
        }

            .btn-logout:hover {
                background: var(--danger);
                color: white;
            }
    </style>
</head>
<body>
    <div class="page">
        <div class="container">

            <div class="nav-bar">
                <div style="font-size: 1.2rem; font-weight: 800; color: var(--text);">Staff Control Center</div>
                <div class="nav-links">
                    <span class="badge" style="margin-right: 10px;">ID: {{ user_id or "Admin" }}</span>
                    <a href="/" class="btn-home">Home</a>
                    <a href="/logout" class="btn-logout">Logout</a>
                </div>
            </div>

            <div class="grid grid-3">
                <!-- Book Title Creation -->
                <div class="card">
                    <div class="card-header">
                        <h3>Create Book Title</h3>
                    </div>
                    
                    <div class="card-body">
                        <div class="form-grid">
                            <input type="text" id="titleName" placeholder="Title Name">
                            <input type="number" id="publicationYear" placeholder="Publication Year">
                            <input type="number" id="publisherId" placeholder="Publisher ID">

                            <p id="titleMsg" class="message"></p>
                            <button onclick="createBookTitle()">Create</button><p id="titleMsg" class="message"></p>
                        </div>
                    </div>
                </div>

                <!-- Book Copy Creation -->
                <div class="card">
                    <div class="card-header">
                        <h3>Create Book Copy</h3>
                    </div>

                    <div class="card-body">
                        <div class="form-grid">
                            <input type="number" id="copyTitleId" placeholder="Title ID">
                           
                            <p id="copyMsg" class="message"></p>
                            <button onclick="createBookCopy()">Create</button>
                        </div>
                    </div>
                </div>

                <!-- Checkout Creation -->
                <div class="card">
                    <div class="card-header">
                        <h3>Create Checkout</h3>
                    </div>

                    <div class="card-body">
                        <div class="form-grid">
                            <input type="number" id="checkoutMemberId" placeholder="Member ID">
                            <input type="number" id="checkoutEmpId" placeholder="Employee ID">

                            <p id="checkoutMsg" class="message"></p>
                            <button class="btn-warning" onclick="createCheckout()">Create</button>
                        </div>
                    </div>
                </div>
                
                <!-- Checkout Item Creation -->
                <div class="card">
                    <div class="card-header">
                        <h3>Add Item to Checkout</h3>
                    </div>

                    <div class="card-body">
                        <div class="form-grid">
                            <input type="number" id="checkoutId" placeholder="Checkout ID">
                            <input type="number" id="checkoutCopyId" placeholder="Copy ID">
                            
                            <p id="checkoutItemMsg" class="message"></p>
                            <button class="btn-warning" onclick="createCheckoutItem()">Add</button>
                        </div>
                    </div>
                </div>

                <!-- Return an Item -->
                <div class="card">
                    <div class="card-header">
                        <h3>Return Item</h3>
                    </div>
                    <div class="card-body">
                        <div class="form-grid">
                            <input type="number" id="returnCheckoutId" placeholder="Checkout ID">
                            <input type="number" id="returnCopyId" placeholder="Copy ID">
                            <button class="btn-warning" onclick="returnCheckoutItem()">Return</button>
                            <p id="returnMsg" class="message"></p>
                        </div>
                    </div>
                </div>

                <!-- Add Member -->
                <div class="card">
                    <div class="card-header">
                        <h3>Add Member</h3>
                    </div>

                    <div class="card-body">
                        <div class="form-grid">
                            <input type="text" id="memberName" placeholder="Name">
                            <input type="email" id="memberEmail" placeholder="Email">

                            <p id="memberMsg" class="message"></p>
                            <button class="btn-success" onclick="createMember()">Add Member</button>
                        </div>
                    </div>
                </div>

                <!-- Hire Employee -->
                <div class="card">
                    <div class="card-header">
                        <h3>Hire Employee</h3>
                    </div>

                    <div class="card-body">
                        <div class="form-grid">
                            <input type="text" id="employeeName" placeholder="Author Name">
                            <input type="text" id="employeeEmail" placeholder="Employee Email">
                            <input type="text" id="employeeRank" placeholder="Employee Rank no.">

                            <p id="employeeMsg" class="message"></p>
                            <button class="btn-success" onclick="createEmployee()">Hire</button>
                        </div>
                    </div>
                </div>

                <!-- Fire Employee -->
                <div class="card">
                    <div class="card-header">
                        <h3>Fire Employee</h3>
                    </div>

                    <div class="card-body">
                        <div class="form-grid">
                            <input type="text" id="fireEmployeeId" placeholder="Employee ID">
                            <input type="text" id="fireEmployeeName" placeholder="Employee Name">

                            <p id="fireEmployeeMsg" class="message"></p>
                            <button class="btn-danger" onclick="fireEmployee()">Fire</button>
                        </div>
                    </div>
                </div>
                
                <!-- Remove Member -->
                <div class="card">
                    <div class="card-header">
                        <h3>Remove Member</h3>
                    </div>

                    <div class="card-body">
                        <div class="form-grid">
                            <input type="text" id="removeMemberId" placeholder="Member ID">
                            <input type="text" id="removeMemberName" placeholder="Member Name">

                            <p id="removeMemberMsg" class="message"></p>
                            <button class="btn-danger" onclick="removeMember()">Remove</button>
                        </div>
                    </div>
                </div>

                <!-- Remove Fee -->
                <div class="card">
                    <div class="card-header">
                        <h3>Remove Fee</h3>
                    </div>

                    <div class="card-body">
                        <div class="form-grid">
                            <input type="text" id="feeMemberID" placeholder="Member ID">
                            <input type="text" id="feeID" placeholder="Fee ID">
                            <input type="number" id="feeAmount" placeholder="Amount to Remove">

                            <p id="feeMsg" class="message"></p>
                            <button class="btn-danger" onclick="removeFee()">Remove Fee</button>
                        </div>
                    </div>
                </div>
            </div>
    </div>

    <script>
        async function postForm(url, dataObj) {
            const formData = new FormData();
            Object.entries(dataObj).forEach(([key, value]) => formData.append(key, value));
            const response = await fetch(url, { method: "POST", body: formData });
            return await response.json();
        }
        function showMessage(id, text) { document.getElementById(id).innerText = text; }

        async function createPublisher() { 
            const data = await postForm("/api/create-publisher", { publisher_name: document.getElementById("publisherName").value });
            showMessage("publisherMsg", data.error ? "Error: " + data.error : `Publisher created. ID: ${data.publisher_id}`); }

        async function createAuthor() { 
            const data = await postForm("/api/create-author", { author_name: document.getElementById("authorName").value }); 
            showMessage("authorMsg", data.error ? "Error: " + data.error : `Author created. ID: ${data.author_id}`); }

        async function createBookTitle() { 
            const data = await postForm("/api/create-book-title", { title_name: document.getElementById("titleName").value, publisher_id: document.getElementById("publisherId").value, publication_year: document.getElementById("publicationYear").value || 0, subject_area: "", age_restriction: 0 }); 
            showMessage("titleMsg", data.error ? "Error: " + data.error : `Book title created. ID: ${data.title_id}`); }
        
        async function createBookCopy() { 
            const data = await postForm("/api/create-book-copy", { title_id: document.getElementById("copyTitleId").value });
            showMessage("copyMsg", data.error ? "Error: " + data.error : `Book copy created. ID: ${data.copy_id}`); }

        async function createMember() {
            const data = await postForm("/api/create-member", { member_name: document.getElementById("memberName").value, member_email: document.getElementById("memberEmail").value });
            showMessage("memberMsg", data.error ? "Error: " + data.error : `Member created. ID: ${data.member_id}`); }
        
        async function createEmployee() {
            const data = await postForm("/api/create-employee", { employee_name: document.getElementById("employeeName").value, employee_email: document.getElementById("employeeEmail").value, employee_rank: document.getElementById("employeeRank").value });
            showMessage("employeeMsg", data.error ? "Error: " + data.error : `Employee created. ID: ${data.employee_id}`); }

        async function createCheckout() { 
            const data = await postForm("/api/create-checkout", { member_id: document.getElementById("checkoutMemberId").value, emp_id: document.getElementById("checkoutEmpId").value });
            showMessage("checkoutMsg", data.error ? "Error: " + data.error : `Checkout created. ID: ${data.checkout_id}`); }

        async function createCheckoutItem() { 
            const data = await postForm("/api/create-checkout-item", { checkout_id: document.getElementById("checkoutId").value, copy_id: document.getElementById("checkoutCopyId").value, due_date: document.getElementById("checkoutDueDate").value });
            showMessage("checkoutItemMsg", data.error ? "Error: " + data.error : data.message); }
        
        async function returnCheckoutItem() { 
            const data = await postForm("/api/return-checkout-item", { checkout_id: document.getElementById("returnCheckoutId").value, copy_id: document.getElementById("returnCopyId").value });
            showMessage("returnMsg", data.error ? "Error: " + data.error : data.message); }

        async function renewCheckoutItem() {
            const data = await postForm("/api/renew-checkout-item", { checkout_id: document.getElementById("renewCheckoutId").value, copy_id: document.getElementById("renewCopyId").value });
            showMessage("renewMsg", data.error ? "Error: " + data.error : data.message); }
        
        async function fireEmployee() {
            const data = await postForm("/api/fire-employee", { employee_id: document.getElementById("fireEmployeeId").value, employee_name: document.getElementById("fireEmployeeName").value });
            showMessage("fireEmployeeMsg", data.error ? "Error: " + data.error : data.message); }
        
        async function removeMember() {
            const data = await postForm("/api/remove-member", { member_id: document.getElementById("removeMemberId").value, member_name: document.getElementById("removeMemberName").value });
            showMessage("removeMemberMsg", data.error ? "Error: " + data.error : data.message); }
        
        async function removeFee() {
            const data = await postForm("/api/remove-fee", { member_id: document.getElementById("feeMemberID").value, fee_id: document.getElementById("feeID").value, amount: document.getElementById("feeAmount").value });
            showMessage("feeMsg", data.error ? "Error: " + data.error : data.message); }

        async function loadMostBorrowed() {
            const response = await fetch("/api/report/most-borrowed-titles"); const data = await response.json();
            const head = document.getElementById("reportHead"); const table = document.getElementById("reportTable"); const msg = document.getElementById("reportMsg");
            if (data.error) { msg.innerText = "Error: " + data.error; return; }
            head.innerHTML = `<tr><th>Title ID</th><th>Title Name</th><th>Borrow Count</th></tr>`;
            if (!data.results.length) { table.innerHTML = `<tr><td colspan="3" class="subtle">No data yet.</td></tr>`; return; }
            table.innerHTML = data.results.map(row => `<tr><td>${row.TITLE_ID}</td><td>${row.TITLE_NAME}</td><td>${row.BORROW_COUNT}</td></tr>`).join("");
            msg.innerText = "Loaded most borrowed titles.";
        }

        async function loadOverdueItems() {
            const response = await fetch("/api/report/overdue-items"); const data = await response.json();
            const head = document.getElementById("reportHead"); const table = document.getElementById("reportTable"); const msg = document.getElementById("reportMsg");
            if (data.error) { msg.innerText = "Error: " + data.error; return; }
            head.innerHTML = `<tr><th>Checkout ID</th><th>Copy ID</th><th>Due Date</th><th>Member ID</th></tr>`;
            if (!data.results.length) { table.innerHTML = `<tr><td colspan="4" class="subtle">No overdue items.</td></tr>`; return; }
            table.innerHTML = data.results.map(row => `<tr><td>${row.CHECKOUT_ID}</td><td>${row.COPY_ID}</td><td>${row.CHECKOUT_ITEM_DUEDATE}</td><td>${row.MEMBER_ID}</td></tr>`).join("");
            msg.innerText = "Loaded overdue items.";
            <section class="card">
                <h2>Overdue Items</h2>
                <button type="button" onclick="loadOverdueItems()">Refresh Overdue Items</button>
                <div id="overdue-items">No data loaded yet.</div>
            </section>
        }
    </script>
    <script>
        async function loadOverdueItems() {
            const container = document.getElementById("overdue-items");
            container.innerHTML = "<p>Loading...</p>";

            try {
                const response = await fetch("/api/report/overdue-items");
                const data = await response.json();

                if (data.error) {
                    container.innerHTML = `<p>${data.error}</p>`;
                    return;
                }

                if (!data.results || data.results.length === 0) {
                    container.innerHTML = "<p>No overdue items found.</p>";
                    return;
                }

                container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Checkout ID</th>
                            <th>Copy ID</th>
                            <th>Due Date</th>
                            <th>Member ID</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.results.map(item => `
                            <tr>
                                <td>${item.CHECKOUT_ID}</td>
                                <td>${item.COPY_ID}</td>
                                <td>${item.CHECKOUT_ITEM_DUEDATE}</td>
                                <td>${item.MEMBER_ID}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `;
            } catch (error) {
                container.innerHTML = "<p>Could not load overdue items.</p>";
            }
        }
    </script>
</body>
</html>
